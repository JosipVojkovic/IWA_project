<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forbidden</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5" style="max-width: 640px">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="d-flex align-items-center mb-3">
            <div class="me-3 fs-2">🚫</div>
            <div>
              <h1 class="h4 mb-1">Forbidden</h1>
              <p class="text-muted mb-0">You do not have permission to view this page.</p>
            </div>
          </div>

          <p class="mb-4">
            If you believe this is a mistake, please contact an administrator or
            switch to an account with access.
          </p>

          <div class="d-flex gap-2">
            <a class="btn btn-primary" href="{% url 'movie_list' %}">Go to movies</a>
            <a class="btn btn-outline-secondary" href="{% url 'logout' %}">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
